<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement</title>
<style>
body { display:flex; justify-content:center; align-items:center; height:100vh; background:#444; color:#fff; font-family:sans-serif; flex-direction:column; text-align:center; }
button { padding:10px 20px; margin:10px; cursor:pointer; }
</style>
</head>
<body>
<h1>Paiement</h1>
<p>Pour payer et utiliser OCTABOT :</p>
<p>Envoyez un message sur WhatsApp à : <strong>+243820737907</strong></p>
<button onclick="openWhatsapp()">Envoyer message</button>
<p>Après paiement, revenez ici et attendez confirmation...</p>

<script>
function openWhatsapp() {
  const text = encodeURIComponent("Salut OCTAVIO je vais payer 5000fc pour utiliser tes offres et créer mes cmd JS");
  window.open(`https://wa.me/243820737907?text=${text}`, "_blank");
}

const userId = localStorage.getItem("userId");
const socket = io();
socket.emit("join-room", userId);

socket.on("payment-response", status => {
  if(status === "yes") window.location.href = "chatbot.html";
  else if(status === "no") alert("Paiement non confirmé. La page sera fermée.");
});
</script>
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
</body>
</html>
