<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Paiement M-Pesa</title>
<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;background:#111;color:#fff;font-family:sans-serif;}
button{padding:15px 30px;font-size:18px;background:#1abc9c;color:#111;border:none;border-radius:5px;cursor:pointer;}
</style>
</head>
<body>
<button id="payBtn">Payer via M-Pesa</button>

<script>
document.getElementById('payBtn').addEventListener('click', async ()=>{
    const res=await fetch('/api/payment',{method:'POST'});
    const data=await res.json();
    if(data.success){
        alert('Paiement confirmé !');
        window.location.href='chatbot.html';
    } else alert('Erreur paiement');
});
</script>
</body>
</html>
