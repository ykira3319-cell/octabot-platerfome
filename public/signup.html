<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inscription</title>
<style>
body{background:#111;color:#fff;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;}
form{display:flex;flex-direction:column;width:300px;}
input,button{margin:5px;padding:10px;font-size:16px;border-radius:5px;border:none;}
button{background:#1abc9c;color:#111;cursor:pointer;}
</style>
</head>
<body>
<form id="signupForm">
<h2>Inscription</h2>
<input type="text" id="name" placeholder="Nom" required>
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Mot de passe" required>
<button type="submit">S'inscrire</button>
</form>

<script>
const form=document.getElementById('signupForm');
form.addEventListener('submit',async e=>{
    e.preventDefault();
    const res=await fetch('/api/signup',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            name:document.getElementById('name').value,
            email:document.getElementById('email').value,
            password:document.getElementById('password').value
        })
    });
    const data=await res.json();
    if(data.success){ window.location.href='payment.html'; }
    else{ alert(data.message); }
});
</script>
</body>
</html>
