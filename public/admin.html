<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin OCTABOT</title>
<style>
body { display:flex; flex-direction:column; align-items:center; font-family:sans-serif; padding:20px; }
input, button { margin:10px; padding:10px; }
</style>
</head>
<body>
<h1>Admin – Confirmer Paiement</h1>
<input type="text" id="userId" placeholder="ID utilisateur">
<button onclick="confirm('yes')">Oui – Confirmer</button>
<button onclick="confirm('no')">Non – Refuser</button>

<script>
async function confirm(status){
  const userId = document.getElementById("userId").value;
  if(!userId) return alert("Entrez un userId !");
  await fetch("/confirm-payment", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ userId, status })
  });
  alert("Statut envoyé !");
}
</script>
</body>
    </html>
